services:
  # ── Infrastructure ────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: warex_mysql
    environment:
      - MYSQL_ROOT_PASSWORD=root8804
      - MYSQL_USER=inventory_user
      - MYSQL_PASSWORD=inventory_pass
      - MYSQL_DATABASE=auth_db
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "inventory_user", "-pinventory_pass"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: always

    networks:
      - warex-network

  redis:
    image: redis:7.0-alpine
    container_name: warex_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - warex-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: warex_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - warex-network

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: warex_kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD-SHELL", "bash -c '< /dev/tcp/localhost/9092' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - warex-network

networks:
  warex-network:
    driver: bridge

volumes:
  mysql_data:
