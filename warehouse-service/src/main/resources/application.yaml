spring:
  application:
    name: warehouse-service
  config:
    import: optional:file:.env[.properties]

  # ── MySQL ─────────────────────────────────────────────────────────────────
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3307/warehouse_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
    username: ${DB_USER:inventory_user}
    password: ${DB_PASS:inventory_pass}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  # ── JPA / Hibernate ───────────────────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: validate          # Flyway owns the schema; Hibernate only validates
    show-sql: false
    open-in-view: false           # Prevents lazy-load surprises outside transactions
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

  jackson:
    time-zone: UTC
    serialization:
      write-dates-as-timestamps: false

  # ── Flyway ────────────────────────────────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  # ── Kafka ─────────────────────────────────────────────────────────────────
  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:localhost:9092}

# ── Eureka Client ─────────────────────────────────────────────────────────
eureka:
  instance:
    prefer-ip-address: true
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://${EUREKA_USERNAME:eureka}:${EUREKA_PASSWORD:eureka-secret}@${EUREKA_HOST:localhost}:${EUREKA_PORT:8761}/eureka/

# ── Server ────────────────────────────────────────────────────────────────
server:
  port: ${SERVER_PORT:8082}

# ── JWT (shared secret with Auth Service) ────────────────────────────────
jwt:
  secret: ${JWT_SECRET}

app:
  services:
    product-service:
      url: ${PRODUCT_SERVICE_URL:http://localhost:8083}

# ── Actuator ──────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: when-authorized

# ── SpringDoc / Swagger UI ────────────────────────────────────────────────
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
  api-docs:
    path: /api-docs
