name: Build and Deploy Backend

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository_owner }}/warex-backend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - eureka-server
          - auth-service
          - product-service
          - warehouse-service
          - supplier-service
          - purchase-order-service
          - stock-movement-service
          - payment-service
          - alert-service
          - report-service
          - admin-server
          - api-gateway

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build service jar
        working-directory: ${{ matrix.service }}
        run: mvn -B -DskipTests clean package

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service }}
          file: ${{ matrix.service }}/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.service }}:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare deploy bundle
        shell: bash
        run: |
          mkdir -p deploy-bundle/docker/mysql
          cp docker-compose.ec2.yml deploy-bundle/docker-compose.ec2.yml
          cp docker/mysql/init.sql deploy-bundle/docker/mysql/init.sql
          printf '%s\n' "${{ secrets.BACKEND_EC2_ENV_FILE }}" > deploy-bundle/.env
          {
            echo "IMAGE_REGISTRY=${{ env.REGISTRY }}"
            echo "IMAGE_NAMESPACE=${{ env.IMAGE_NAMESPACE }}"
            echo "IMAGE_TAG=${{ github.sha }}"
          } >> deploy-bundle/.env

      - name: Copy files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.BACKEND_EC2_HOST }}
          username: ${{ secrets.BACKEND_EC2_USER }}
          key: ${{ secrets.BACKEND_EC2_SSH_KEY }}
          source: "deploy-bundle/*"
          target: "/opt/warex-backend"
          strip_components: 1

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.BACKEND_EC2_HOST }}
          username: ${{ secrets.BACKEND_EC2_USER }}
          key: ${{ secrets.BACKEND_EC2_SSH_KEY }}
          script: |
            set -e
            cd /opt/warex-backend
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ github.repository_owner }}" --password-stdin
            docker compose --env-file .env -f docker-compose.ec2.yml pull
            docker compose --env-file .env -f docker-compose.ec2.yml up -d
