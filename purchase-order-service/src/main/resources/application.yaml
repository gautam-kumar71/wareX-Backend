server:
  port: ${SERVER_PORT:8084}

spring:
  application:
    name: purchase-order-service
  config:
    import: optional:file:.env[.properties]

  # ── MySQL ──────────────────────────────────────────────────────────────────
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3307}/${DB_NAME:purchase_order_db}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
    username: ${DB_USER:inventory_user}
    password: ${DB_PASS:inventory_pass}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  # ── JPA / Hibernate ────────────────────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

  jackson:
    time-zone: UTC
    serialization:
      write-dates-as-timestamps: false

  # ── Flyway ─────────────────────────────────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # ── Kafka ──────────────────────────────────────────────────────────────────
  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:localhost:9092}

# ── Feign ──────────────────────────────────────────────────────────────────
feign:
  circuitbreaker:
    enabled: true   # Required for fallback= on @FeignClient to activate Resilience4j

# ── Eureka Client ──────────────────────────────────────────────────────────
eureka:
  instance:
    prefer-ip-address: true
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://${EUREKA_USERNAME:eureka}:${EUREKA_PASSWORD:eureka-secret}@${EUREKA_HOST:localhost}:${EUREKA_PORT:8761}/eureka/

# ── JWT (shared secret with Auth Service) ─────────────────────────────────
jwt:
  secret: ${JWT_SECRET}

# ── Actuator ───────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: when-authorized

# ── SpringDoc / Swagger UI ─────────────────────────────────────────────────
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
  api-docs:
    path: /api-docs

# ── Resilience4j ───────────────────────────────────────────────────────────
resilience4j:
  circuitbreaker:
    configs:
      default:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 5s
        failureRateThreshold: 50
        eventConsumerBufferSize: 10
    instances:
      warehouse-service:
        baseConfig: default
      supplier-service:
        baseConfig: default
  timelimiter:
    configs:
      default:
        timeoutDuration: 2s
        cancelRunningFuture: true
    instances:
      warehouse-service:
        baseConfig: default
      supplier-service:
        baseConfig: default

# ── Logging ────────────────────────────────────────────────────────────────
logging:
  level:
    com.inventory.purchaseorder: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
